<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micro &amp; Macro Animations Engine</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- Three.js for true 3D puppet rendering (no bundler needed) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <div id="main-area">
      <div id="canvas-container">
        <div id="bg-ref"></div>
        <div id="svg-layer"></div>
        <canvas id="canvas"></canvas>
        <div id="zoom-controls">
          <button id="zoom-out" title="Zoom out 10%">−</button>
          <span id="zoom-level">100%</span>
          <button id="zoom-in" title="Zoom in 10%">+</button>
        </div>
      </div>
      <!-- Timeline panel -->
      <div id="timeline">
        <div id="timeline-header">
          <button id="timeline-toggle-play" title="Play/Pause">⏸</button>
          <span id="timeline-time">0.00s</span>
          <div id="timeline-scrubber-wrap">
            <canvas id="timeline-canvas"></canvas>
          </div>
        </div>
        <div id="timeline-tracks"></div>
      </div>
    </div>
    <aside id="dev-panel">
      <div class="panel-header">
        <h2>Dev Controls</h2>
        <button id="toggle-panel" title="Collapse">▶</button>
      </div>
    </aside>
    <button id="expand-panel" title="Open Dev Controls">◀</button>
  </div>

  <script type="module" src="js/engine.js"></script>
  <script>
    document.getElementById('toggle-panel').addEventListener('click', function() {
      const panel = document.getElementById('dev-panel');
      const expandBtn = document.getElementById('expand-panel');
      panel.classList.add('collapsed');
      expandBtn.style.display = 'flex';
    });

    document.getElementById('expand-panel').addEventListener('click', function() {
      const panel = document.getElementById('dev-panel');
      panel.classList.remove('collapsed');
      this.style.display = 'none';
    });

    // Zoom controls
    function updateZoomUI() {
      document.getElementById('zoom-level').textContent = Math.round(window.__engine.userZoom * 100) + '%';
    }
    window.updateZoomUI = updateZoomUI;
    document.getElementById('zoom-in').addEventListener('click', () => {
      window.__engine.userZoom = Math.min(5, window.__engine.userZoom + 0.1);
      updateZoomUI();
    });
    document.getElementById('zoom-out').addEventListener('click', () => {
      window.__engine.userZoom = Math.max(0.1, window.__engine.userZoom - 0.1);
      updateZoomUI();
    });
  </script>
</body>
</html>
