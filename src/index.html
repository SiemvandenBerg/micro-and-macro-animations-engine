<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micro &amp; Macro Animations Engine</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
      <div id="zoom-controls">
        <button id="zoom-out" title="Zoom out 10%">−</button>
        <span id="zoom-level">100%</span>
        <button id="zoom-in" title="Zoom in 10%">+</button>
      </div>
    </div>
    <aside id="dev-panel">
      <div class="panel-header">
        <h2>Dev Controls</h2>
        <button id="toggle-panel" title="Collapse">◀</button>
      </div>
    </aside>
  </div>

  <script type="module" src="js/engine.js"></script>
  <script>
    document.getElementById('toggle-panel').addEventListener('click', function() {
      const panel = document.getElementById('dev-panel');
      panel.classList.toggle('collapsed');
      this.textContent = panel.classList.contains('collapsed') ? '▶' : '◀';
    });

    // Zoom controls
    function updateZoomUI() {
      document.getElementById('zoom-level').textContent = Math.round(window.__engine.userZoom * 100) + '%';
    }
    window.updateZoomUI = updateZoomUI;
    document.getElementById('zoom-in').addEventListener('click', () => {
      window.__engine.userZoom = Math.min(5, window.__engine.userZoom + 0.1);
      updateZoomUI();
    });
    document.getElementById('zoom-out').addEventListener('click', () => {
      window.__engine.userZoom = Math.max(0.1, window.__engine.userZoom - 0.1);
      updateZoomUI();
    });
  </script>
</body>
</html>
